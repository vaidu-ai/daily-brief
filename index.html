<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="0; url=https://vaidu-ai.github.io/solar-stats/" />
  <link rel="canonical" href="https://vaidu-ai.github.io/solar-stats/" />
  <title>Solar Stats moved</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #171717;
      background: #fff;
    }
    main {
      width: min(560px, calc(100% - 48px));
      padding: 32px;
      border: 1px solid #00000014;
      border-radius: 12px;
      box-shadow: 0 2px 2px rgba(0, 0, 0, 0.04);
    }
    h1 { margin: 0 0 12px; font-size: 32px; line-height: 40px; letter-spacing: -1.28px; }
    p { margin: 0 0 20px; color: #4d4d4d; font-size: 16px; line-height: 24px; }
    a {
      display: inline-flex;
      align-items: center;
      height: 40px;
      padding: 0 10px;
      border-radius: 6px;
      background: #171717;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Solar Stats moved.</h1>
    <p>The solar stats page now lives in the dedicated <code>vaidu-ai/solar-stats</code> repository.</p>
    <a href="https://vaidu-ai.github.io/solar-stats/">Open Solar Stats</a>
  </main>
</body>
</html>
